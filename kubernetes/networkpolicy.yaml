apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: profile-stats
  namespace: profile-stats
spec:
  podSelector:
    matchLabels:
      app: profile-stats
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Allow traffic only from the ingress controller namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080

  egress:
    # DNS — required for in-cluster service discovery and external hostname resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # Prometheus and Alertmanager (in-cluster, monitoring namespace)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9090  # Prometheus
        - protocol: TCP
          port: 9093  # Alertmanager

    # Uptime Kuma (in-cluster, monitoring namespace)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 3001

    # GitHub API and GHCR (external HTTPS)
    - ports:
        - protocol: TCP
          port: 443
